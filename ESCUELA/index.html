<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escuela Digital</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="container">

<!-- IZQUIERDA -->
<div class="izquierda">

<img src="img/lg.png" class="logo">
<p class="descripcion">
FORMAMOS PROFESIONALES.

<img src="img/fl.png" class="imagen">

</div>

<!-- DERECHA -->
<div class="derecha">

<h2 class="subtitulo">Formulario de Registro</h2>

<form id="form" class="formulario">

<input type="text" id="nombre" placeholder="Nombre" required class="input">
<input type="text" id="apellidos" placeholder="Apellidos" required class="input">
<input type="text" id="telefono" placeholder="Teléfono" required class="input">
<input type="email" id="correo" placeholder="Correo" required class="input">

<select id="carrera" required class="input">
<option value="">Selecciona carrera</option>
<option>Diseño gráfico</option>
<option>Derecho</option>
<option>Arquitectura</option>
<option>Biología</option>
<option>Agronomía</option>
</select>

<button type="submit" class="btn">Enviar registro</button>

</form>

</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxXTEyGz5B_AUAtx7pB86PA4AaruSgPNduD6HhmbEi_y4GBD4kZ0XY4VREyUKECzCyCvg/exec";

document.getElementById("form").addEventListener("submit", function(e){

e.preventDefault();

const datos = {
nombre: document.getElementById("nombre").value,
apellidos: document.getElementById("apellidos").value,
telefono: document.getElementById("telefono").value,
correo: document.getElementById("correo").value,
carrera: document.getElementById("carrera").value
};

fetch(url,{
method:"POST",
body: JSON.stringify(datos)
})
.then(res => res.text())
.then(data=>{
alert("Registro enviado correctamente");
document.getElementById("form").reset();
})
.catch(error=>{
console.log(error);
alert("Error al enviar");
});

});

</script>
<footer class="footer">
© 2026 Jose Balam y Saul Aldaz
</footer>
</body>
</html>
